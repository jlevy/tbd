name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm publint

      - name: Publish to npm
        run: pnpm -r publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Extract changelog for this version
        id: changelog
        run: |
          # Extract the "## X.Y.Z" section out of packages/tbd/CHANGELOG.md so
          # softprops/action-gh-release can use it as the GitHub Release body.
          #
          # An earlier version used the awk range pattern
          # `/^## X\.Y\.Z$/,/^## [0-9]/`. That broke silently on every release
          # because the start line itself ALSO matches the end pattern (a `## `
          # followed by a digit), so the range collapses to a single line and
          # the fallback "Release vX.Y.Z" body kicks in. Both v0.1.30 and v0.2.0
          # were published with the empty fallback.
          #
          # Fix: explicitly print the start line and use a flag so the end
          # pattern only fires on the NEXT `## [0-9]` heading.
          VERSION="${{ steps.version.outputs.version }}"
          ESCAPED_VERSION="${VERSION//./\\.}"
          CHANGELOG=$(awk -v ver="^## ${ESCAPED_VERSION}\$" '
            $0 ~ ver { flag = 1; print; next }
            flag && /^## [0-9]/ { exit }
            flag { print }
          ' packages/tbd/CHANGELOG.md)
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="Release v${VERSION}"
          fi
          # Use delimiter for multiline output
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
