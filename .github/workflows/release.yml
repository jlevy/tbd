# TEMPORARY branch-local release recovery for v0.4.1 (publishing.md §stall recovery).
# The session that drove the release cannot push tags (broker scopes pushes to
# branches), so this variant creates the tag at the audited merge SHA and runs the
# same publish steps as the real tag-triggered workflow. Filename must remain
# release.yml (npm trusted publishing is bound to it). Revert to the main version
# immediately after the release verifies.
name: Release

on:
  push:
    branches:
      - claude/release-v0.4.1-publish

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  RELEASE_VERSION: 0.4.1
  RELEASE_TAG: v0.4.1
  RELEASE_SHA: 889f3c6bf14788100ecba430e372be4f26affb1a

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Create or verify tag at audited merge SHA
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          existing=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" --jq '.object.sha' 2>/dev/null || true)
          if [ -z "$existing" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/git/refs" -X POST \
              -f ref="refs/tags/${RELEASE_TAG}" -f sha="${RELEASE_SHA}"
            echo "Created ${RELEASE_TAG} at ${RELEASE_SHA}"
          elif [ "$existing" = "${RELEASE_SHA}" ]; then
            echo "${RELEASE_TAG} already exists at the audited SHA"
          else
            echo "::error::${RELEASE_TAG} exists at ${existing}, expected ${RELEASE_SHA}"
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          ref: refs/tags/v0.4.1
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm publint

      # Resolve the release body BEFORE publishing: if the wrapper or changelog path
      # ever fails, fail here rather than after the package is already on npm.
      # GITHUB_REF is a branch in this recovery variant, so the version is explicit.
      - name: Extract changelog for this version
        id: changelog
        run: |
          DELIM="body_$(openssl rand -hex 8)"
          {
            echo "body<<${DELIM}"
            pnpm exec tsx packages/tbd/scripts/extract-changelog.ts "${RELEASE_VERSION}"
            echo "${DELIM}"
          } >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        run: pnpm -r publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.4.1
          body: ${{ steps.changelog.outputs.body }}
          prerelease: false
