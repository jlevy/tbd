# TEMPORARY branch-local variant of release.yml to finish the v0.4.0 release.
#
# On main, this workflow triggers on v* tag pushes. The v0.4.0 tag had to be
# created via the GitHub API with GITHUB_TOKEN (the release session could not
# push tags), and GITHUB_TOKEN-created refs deliberately do not trigger
# workflows — so the tag exists but the release never ran. npm publishing for
# get-tbd uses trusted publishing (OIDC) bound to this repo and the workflow
# filename "release.yml", which is why this must run under this filename.
#
# This copy triggers on a push to the release branch instead, verifies the
# v0.4.0 tag points at the audited merge commit, and then runs the exact same
# steps as the real release.yml against the tagged commit. Reverted to the
# main version once the release is verified.

name: Release

on:
  push:
    branches:
      - claude/tbd-v0.4.0-release-d3wwrx

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      VERSION: 0.4.0
      # Merge commit of PR #189 on main; main CI concluded success on this SHA.
      RELEASE_SHA: 411f7f91adbd3d4c9f9dacb83c3d746f0c0f7a26
    steps:
      - name: Verify v0.4.0 tag points at the audited commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          existing=""
          if resp=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/v${VERSION}" --jq .object.sha 2>/dev/null); then
            existing="$resp"
          fi
          if [ "$existing" = "${RELEASE_SHA}" ]; then
            echo "Tag v${VERSION} is at ${RELEASE_SHA}; proceeding"
          else
            echo "Refusing: tag v${VERSION} is at '${existing}', expected ${RELEASE_SHA}" >&2
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          ref: refs/tags/v0.4.0
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm publint

      # Resolve the release body BEFORE publishing: if the wrapper or changelog path
      # ever fails, fail here rather than after the package is already on npm.
      - name: Extract changelog for this version
        id: changelog
        run: |
          DELIM="body_$(openssl rand -hex 8)"
          {
            echo "body<<${DELIM}"
            pnpm exec tsx packages/tbd/scripts/extract-changelog.ts "${VERSION}"
            echo "${DELIM}"
          } >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        run: pnpm -r publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.4.0
          body: ${{ steps.changelog.outputs.body }}
          prerelease: false
