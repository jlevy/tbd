# lefthook.yml
# Git hooks for code quality
# Pre-commit: Fast checks with auto-fix (target: 2-5 seconds)
# Pre-push: Full test validation

pre-commit:
  parallel: true

  commands:
    # Auto-format with prettier (~500ms)
    format:
      glob: '*.{js,ts,tsx,json,yaml,yml}'
      run: npx prettier --write --log-level warn {staged_files}
      stage_fixed: true
      priority: 1

    # Format markdown with flowmark (~500ms)
    # Excludes auto-generated files (.tbd/, .claude/skills/, .agents/skills/,
    # skills/tbd/, AGENTS.md) — these must match their generator byte-for-byte
    # (guarded by drift tests), so flowmark must not reformat them.
    format-md:
      glob: '*.md'
      exclude: '(\.tbd/|\.claude/skills/|\.agents/skills/|skills/tbd/|AGENTS\.md)'
      run: npx prettier --write --log-level warn {staged_files} && uvx flowmark@0.6.5 --auto {staged_files}
      stage_fixed: true
      priority: 1

    # Lint with auto-fix and caching (~1s first, ~200ms cached)
    lint:
      glob: '*.{js,ts,tsx}'
      run: >
        npx eslint
        --cache
        --cache-location node_modules/.cache/eslint
        --fix {staged_files}
      stage_fixed: true
      priority: 2

    # Type check with incremental mode (~2s)
    typecheck:
      glob: '*.{ts,tsx}'
      run: pnpm typecheck
      priority: 3

pre-push:
  commands:
    # Build if needed - skips if dist is up-to-date (integration tests require dist/bin.mjs)
    build:
      run: pnpm build:check
      priority: 1
    # Then run tests
    test:
      run: pnpm test
      priority: 2
    # Enforce 14-day package-age rule on dependency pins.
    # See packages/tbd/docs/guidelines/pnpm-monorepo-patterns.md#supply-chain-mitigation
    # Only runs when a package.json is staged so day-to-day pushes aren't slowed by registry lookups.
    package-age:
      glob: '{package.json,packages/*/package.json}'
      run: pnpm check:package-age
      priority: 3
